name: Update weekly security news

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate news JSON
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: node scripts/update-news.mjs

      - name: Commit updated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update weekly IPM security news"
          file_pattern: data/news.json data/news-en.json
